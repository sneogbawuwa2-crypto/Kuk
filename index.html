    function App() {
      const [activeDay, setActiveDay] = useState(0);
      const [weights, setWeights] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem("weights")) || {};
        } catch {
          return {};
        }
      });
      const [completed, setCompleted] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem("completed")) || {};
        } catch {
          return {};
        }
      });
      const [expandedEx, setExpandedEx] = useState(null);
      const [savedToast, setSavedToast] = useState(false);

      const day = DAYS[activeDay];

      useEffect(() => {
        localStorage.setItem("weights", JSON.stringify(weights));
      }, [weights]);

      useEffect(() => {
        localStorage.setItem("completed", JSON.stringify(completed));
      }, [completed]);

      const setWeight = (exIdx, value) => {
        setWeights((prev) => ({ ...prev, [`${day.id}-${exIdx}`]: value }));
      };

      const toggleComplete = (exIdx) => {
        const key = `${day.id}-${exIdx}`;
        setCompleted((prev) => ({ ...prev, [key]: !prev[key] }));
      };

      const toggleExpand = (exIdx) => {
        setExpandedEx(expandedEx === exIdx ? null : exIdx);
      };

      const completedCount = day.exercises.filter((_, i) => completed[`${day.id}-${i}`]).length;
      const progress = Math.round((completedCount / day.exercises.length) * 100);

      const handleSave = () => {
        localStorage.setItem("weights", JSON.stringify(weights));
        localStorage.setItem("completed", JSON.stringify(completed));
        setSavedToast(true);
        setTimeout(() => setSavedToast(false), 2000);
      };

      return (
        <div
          style={{
            minHeight: "100vh",
            background: "#08080f",
            color: "#e2e2e8",
            fontFamily: "'Inter', system-ui, sans-serif",
            paddingBottom: 60,
          }}
        >
          {savedToast && (
            <div
              style={{
                position: "fixed",
                top: 16,
                left: "50%",
                transform: "translateX(-50%)",
                background: day.color,
                color: "#000",
                padding: "10px 20px",
                borderRadius: 30,
                fontSize: 13,
                fontWeight: 700,
                zIndex: 999,
                boxShadow: "0 4px 20px rgba(0,0,0,0.4)",

              ✓ Kaydedildi

              borderBottom: "1px solid #1a1a28",
              padding: "20px 16px 0",

                  fontSize: 10,
                  letterSpacing: 3,
                  color: "#444",
                  textTransform: "uppercase",
                  marginBottom: 4,

              <div
                style={{
                  fontSize: 20,
                  fontWeight: 800,
                  color: "#fff",
                  letterSpacing: -0.5,
                  marginBottom: 16,
                }}

                    onClick={() => {
                      setActiveDay(i);
                      setExpandedEx(null);

                      flex: 1,
                      background: "none",
                      border: "none",
                      cursor: "pointer",
                      padding: "8px 4px 10px",
                      borderBottom: activeDay === i ? `2px solid ${d.color}` : "2px solid transparent",

              </div>

                const key = `${day.id}-${i}`;
                const isDone = completed[key];
                const w = weights[key] || "";
                const isOpen = expandedEx === i;

                  <div

                      overflow: "hidden",
                      opacity: isDone ? 0.7 : 1,
                      transition: "all 0.2s",
                    }}
                  >
                    <div

                        padding: "13px 14px",
